<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | NeonWave</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body>
    <div class="overlay"></div>
    <div class="container">
        <div class="row justify-content-center align-items-center vh-100">
            <div class="col-lg-6 col-md-8">
                <div class="auth-card">
                    <div class="text-center mb-4">
                        <h2 class="logo">
                            <i class="fa-solid fa-music me-2"></i>
                            PM Wave
                        </h2>
                        <p class="text-secondary">
                            Create your free account
                        </p>
                    </div>
                    <form id="signupForm">
                        <div class="mb-3">
                            <label class="form-label">
                                Full Name
                            </label>
                            <input type="text" class="form-control" placeholder="Enter your full name" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">
                                Email Address
                            </label>
                            <input type="email" class="form-control" placeholder="Enter your email" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">
                                Password
                            </label>
                            <div class="input-group">
                                <input type="password" id="password" class="form-control" placeholder="Create password"
                                    required>
                                <button type="button" class="btn btn-outline-secondary" id="togglePassword">
                                    <i class="fa-solid fa-eye"></i>
                                </button>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">
                                Confirm Password
                            </label>
                            <div class="input-group">
                                <input type="password" id="confirmPassword" class="form-control"
                                    placeholder="Confirm password" required>
                                <button type="button" class="btn btn-outline-secondary" id="toggleConfirmPassword">
                                    <i class="fa-solid fa-eye"></i>
                                </button>
                            </div>
                        </div>
                        <div class="form-check mb-4">
                            <input class="form-check-input" type="checkbox" required>
                            <label class="form-check-label">
                                I agree to the
                                <a href="#" class="text-info text-decoration-none">
                                    Terms & Conditions
                                </a>
                            </label>
                        </div>
                        <button class="btn btn-info w-100 py-2">
                            Create Account
                        </button>
                    </form>
                    <div class="text-center mt-4">
                        <p>
                            Already have an account?
                            <a href="login.html" class="text-info text-decoration-none">
                                Login
                            </a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="js/login.js"></script>
    <script src="js/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
