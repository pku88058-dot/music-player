<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PM Wave Music Gallery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body>
    <div class="overlay"></div>
    <div class="container my-2">
        <div class="row h-100 align-items-center">
            <div class="col-lg-6">
                <div class="glass-card">
                    <div class="logo text-center mb-4">
                        <img src="img/l.png" alt="logo" class="img-fluid">
                        <h3 class="text-info fw-bold">PM Waves</h3>
                    </div>
                    <h1>
                        Experience Music<br>
                        Like Never Before
                    </h1>
                    <p class="mt-4">
                        Explore millions of songs, trending albums,
                        top artists and curated playlists with an
                        immersive futuristic music experience.
                    </p>
                    <div class="mt-5 d-flex flex-wrap gap-3">
                        <a href="login.html" class="btn btn-info btn-lg rounded-pill px-4">
                            Get Started
                        </a>
                        <a href="signup.html" class="btn btn-outline-light btn-lg rounded-pill px-4">
                            Create Account
                        </a>
                    </div>
                </div>
            </div>
            <div class="col-lg-6">
                <div class="hero-images">
                    <div class="floating-card card1">
                        <img src="img/al-1.jpg">
                    </div>
                    <div class="floating-card card2">
                        <img src="img/al-2.jpg">
                    </div>
                    <div class="floating-card card3">
                        <img src="img/al3.jpg">
                    </div>
                    <div class="floating-card card4">
                        <img src="img/a1.webp">
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
